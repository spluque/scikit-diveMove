# Build and publish to TestPyPI
#
# Closely watch version references for actions!

name: TestPyPI

on:
  push:
    branches:
      - develop

jobs:
  build:
    name: Build Python package
    runs-on: ubuntu-latest
    env:
      PY_LATEST: "3.13"

    steps:
      - uses: actions/checkout@v6

      - name: Set up R (release)
        # They tell us to use master (ambiguously)
        uses: r-lib/actions/setup-r@v2

      - name: Install system requirements
        run: |
          sudo apt-get install libcurl4-openssl-dev ffmpeg

      - name: Install diveMove
        run: |
          install.packages('diveMove')
        shell: Rscript {0}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PY_LATEST }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          plugins: poetry-dynamic-versioning

      - name: Install dependencies
        run: |
          poetry install --no-interaction --all-groups

      - name: Build binary wheel and source tarball
        run: |
          poetry build --clean

      - name: Test
        run: |
          poetry run pytest -v skdiveMove

      - name: Build Sphinx docs
        run: |
          poetry run python -m ipykernel install --user --name="diveMove"
          poetry run make -C docs/ html

      - name: Upload products
        uses: actions/upload-artifact@v7
        if: startsWith(github.ref, 'refs/tags')
        with:
          name: dist-pkg
          path: |
            dist
            docs/build

  publish:
    name: Publish Python distribution to TestPyPI
    if: startsWith(github.ref, 'refs/tags')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/scikit-diveMove
    permissions:
      id-token: write         # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download products
        uses: actions/download-artifact@v8
        with:
          name: dist-pkg

      - name: Display structure of downloaded files
        run: ls -R

      - name: Publish distribution to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
